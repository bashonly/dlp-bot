name: Update actions
on:
  schedule:
    - cron: '17 17 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  build_matrix:
    name: Build matrix
    # Must be either a workflow_dispatch event payload OR a scheduled run on yt-dlp/dlp-bot
    if: github.event.workflow == '.github/workflows/update-actions.yml' || github.repository == 'yt-dlp/dlp-bot'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Build matrix
        id: matrix
        run: python .github/scripts/build_matrix.py

  update_actions:
    name: Update actions (${{ matrix.repo }})
    needs: [build_matrix]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.build_matrix.outputs.matrix) }}
    env:
      HEAD_OWNER: ${{ vars.HEAD_OWNER || 'dlp-bot' }}

    steps:
      - name: Checkout bot repo (dlp-bot)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: dlp-bot
          persist-credentials: false

      - name: Checkout work repo (${{ matrix.repo }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ format('{0}/{1}', env.HEAD_OWNER, matrix.repo) }}
          path: ${{ matrix.repo }}
          fetch-depth: 0
          persist-credentials: true  # Needed to git-push
          # Need ONE of the following:
          token: ${{ secrets.PUSH_TOKEN || github.token }}
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Configure git user
        env:
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME || 'dlp-bot' }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL || 'bot@yt-dlp.org' }}
        run: |
          git config --global user.name "${GIT_USER_NAME}"
          git config --global user.email "${GIT_USER_EMAIL}"

      - name: Configure git with SSH signing key
        if: ${{ vars.SSH_SIGNING_KEY_ID }}
        env:
          SSH_SIGNING_KEY_ID: ${{ vars.SSH_SIGNING_KEY_ID }}
        run: |
          git config --global user.signingkey "${SSH_SIGNING_KEY_ID}"
          git config --global gpg.format ssh
          git config --global commit.gpgsign true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Requirements
        run: |
          python -m pip install -U --require-hashes -r "dlp-bot/requirements/actions.txt"

      - name: Run bot actions ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.PULL_REQUEST_TOKEN }}
          DLPBOT_GIT_PROTOCOL: ${{ vars.DLPBOT_GIT_PROTOCOL || 'ssh' }}
          DLPBOT_ACTIONS_COOLDOWN: ${{ vars.DLPBOT_ACTIONS_COOLDOWN || '7 days' }}
          WORKING_REPO: ${{ matrix.repo }}
        run: |
          cd dlp-bot
          python -m bot actions \
            --pr \
            --verbose \
            --head "${HEAD_OWNER}:bot/update-actions" \
            -- \
            "${WORKING_REPO}" ../"${WORKING_REPO}"
